server:
  port: 8088
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/experiment_report?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.experiment.report.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: ExperimentReportSystemSecretKey2024VeryLongSecretKey
  expiration: 86400000  # 24小时
  header: Authorization
  prefix: "Bearer "

# 文件上传配置
file:
  upload:
    path: ./uploads/
    allowed-types: pdf,doc,docx,xls,xlsx,png,jpg,jpeg,gif

# AI分析配置（豆包/火山方舟API）
ai:
  api:
    enabled: true
    base-url: https://ark.cn-beijing.volces.com/api/v3
    api-key: 82051697-c74d-46e7-8704-9cf4737e59fb
    model: ep-20260211133220-mk6lz
    timeout: 120000
    max-tokens: 2000

# 日志配置
logging:
  level:
    com.experiment.report: debug
